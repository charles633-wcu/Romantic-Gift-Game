<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ec4899">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">
  <title>A Love Story 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; }
    canvas { touch-action: none; display: block; }

    #rotate-prompt {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: #1a1a2e;
      flex-direction: column;
      align-items: center; justify-content: center;
      color: #ffffff; font-family: sans-serif; text-align: center;
    }
    #rotate-prompt span { font-size: 64px; animation: spin 2s ease-in-out infinite; }
    #rotate-prompt p { margin-top: 20px; font-size: 20px; color: #ec4899; }
    @keyframes spin {
      0%, 100% { transform: rotate(0deg); }
      50%       { transform: rotate(90deg); }
    }
    @media (orientation: portrait) {
      #rotate-prompt { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-prompt">
    <span>📱</span>
    <p>Rotate your device to play 💕</p>
  </div>
  <script src="assets/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
  <script>
    // Try to lock orientation to landscape (works on Android Chrome, not iOS Safari)
    if (screen.orientation?.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
    // Register service worker for PWA / offline support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }
</script>
</body>
</html>
